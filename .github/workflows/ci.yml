name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golangci:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Lint with golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          github-token: ${{ secrets.GITHUB_TOKEN }}
          args: --timeout=2m --verbose

  unit_tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Install Tools
        run: |
          set -euo pipefail
          go install github.com/onsi/ginkgo/v2/ginkgo@v2.28.3

      - name: Run combined coverage (unit + e2e)
        run: make coverage-all

      - name: Upload code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: coverage.out

  code_coverage:
    name: Code coverage report
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: unit_tests
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - name: Comment coverage on PR
        uses: fgrosse/go-coverage-report@v1.3.0
        with:
          coverage-artifact-name: code-coverage
          coverage-file-name: coverage.out
