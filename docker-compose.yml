x-app-environment: &app-environment
  APP_NAME: ${APP_NAME}
  APP_DEBUG: ${APP_DEBUG}
  SERVER_PORT: ${SERVER_PORT}
  SERVER_CORS_ORIGINS: ${SERVER_CORS_ORIGINS}
  SERVER_READ_HEADER_TIMEOUT: ${SERVER_READ_HEADER_TIMEOUT}
  SERVER_RATE_LIMIT_ENABLED: ${SERVER_RATE_LIMIT_ENABLED}
  SERVER_RATE_LIMIT_REQUESTS: ${SERVER_RATE_LIMIT_REQUESTS}
  SERVER_RATE_LIMIT_BURST: ${SERVER_RATE_LIMIT_BURST}
  FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
  QUEUE_CONCURRENCY: ${QUEUE_CONCURRENCY}
  QUEUE_STRICT: ${QUEUE_STRICT}
  QUEUE_METRICS_ENABLED: ${QUEUE_METRICS_ENABLED}
  QUEUE_METRICS_PORT: ${QUEUE_METRICS_PORT}
  LOG_LEVEL: ${LOG_LEVEL}
  LOG_FORMAT: ${LOG_FORMAT}
  OTEL_ENABLED: ${OTEL_ENABLED}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME}
  OTEL_EXPORTER: ${OTEL_EXPORTER}
  OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
  OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE}
  OTEL_TRACES_SAMPLER_RATIO: ${OTEL_TRACES_SAMPLER_RATIO}
  OTEL_EXPORT_TIMEOUT: ${OTEL_EXPORT_TIMEOUT}
  REDIS_ADDR: redis:6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  REDIS_DB: ${REDIS_DB}
  REDIS_PREFIX: ${REDIS_PREFIX}
  DB_HOST: db
  DB_PORT: ${DB_PORT}
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_NAME: ${DB_NAME}
  DB_SSLMODE: ${DB_SSLMODE}
  DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS}
  DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS}
  HASH_DRIVER: ${HASH_DRIVER}
  HASH_ARGON2_MEMORY: ${HASH_ARGON2_MEMORY}
  HASH_ARGON2_ITERATION: ${HASH_ARGON2_ITERATION}
  HASH_ARGON2_PARALLELISM: ${HASH_ARGON2_PARALLELISM}
  HASH_BCRYPT_COST: ${HASH_BCRYPT_COST}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
  JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
  JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
  MAIL_HOST: ${MAIL_HOST}
  MAIL_PORT: ${MAIL_PORT}
  MAIL_USERNAME: ${MAIL_USERNAME}
  MAIL_PASSWORD: ${MAIL_PASSWORD}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      <<: *app-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      tempo:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["queue"]
    environment:
      <<: *app-environment
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME}-worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      tempo:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - mimir
    restart: unless-stopped

  mimir:
    image: grafana/mimir:latest
    command: ["-config.file=/etc/mimir.yml"]
    ports:
      - "9009:9009"
    volumes:
      - ./docker/mimir.yml:/etc/mimir.yml
      - mimir_data:/data
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.7.0
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./docker/tempo.yml:/etc/tempo.yaml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - prometheus
      - mimir
      - tempo
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.2
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/loki-config.yml:/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.3.2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped

  mcp-grafana:
    image: grafana/mcp-grafana:latest
    ports:
      - "8000:8000"
    environment:
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_TOKEN=${GRAFANA_SERVICE_ACCOUNT_TOKEN}
    depends_on:
      - grafana
    restart: unless-stopped

volumes:
  db_data:
  mimir_data:

networks:
  default:
    driver: bridge
